// =====================================================================
function parseSRT(text) {
  const blocks = text.trim().replace(/\r\n/g, '\n').split(/\n\n+/);
  const result = [];
  for (const block of blocks) {
    const lines = block.split('\n');
    if (lines.length < 3) continue;
    const index = parseInt(lines[0].trim(), 10);
    if (isNaN(index)) continue;
    const timeLine = lines[1].trim();
    if (!timeLine.includes('-->')) continue;
    const text2 = lines.slice(2).join(' ').trim();
    if (!text2) continue;
    result.push({ index, time: timeLine, text: text2 });
  }
  return result;
}

// =====================================================================
// 单词分词（简单实现，处理缩写和标点）
// =====================================================================
function tokenize(sentence) {
  // 去掉HTML标签
  let s = sentence.replace(/<[^>]+>/g, '');
  // 处理缩写 don't → do n't 等，保留撇号
  const tokens = [];
  // 用正则匹配单词和标点
  const regex = /([a-zA-Z]+'?[a-zA-Z]*)|([.,!?;:'"()\[\]{}\-–—…]+)/g;
  let m;
  while ((m = regex.exec(s)) !== null) {
    if (m[1]) {
      // 处理常见缩写拆分
      const word = m[1];
      const lower = word.toLowerCase();
      // n't 分离
      if (lower.endsWith("n't") && lower.length > 4) {
        tokens.push(word.slice(0, -3));
        tokens.push("n't");
      }
      // 's 分离（但不是所有格如 it's = it is）
      else if (lower.endsWith("'s") && lower.length > 2) {
        tokens.push(word.slice(0, -2));
        tokens.push("'s");
      }
      // 're
      else if (lower.endsWith("'re") && lower.length > 3) {
        tokens.push(word.slice(0, -3));
        tokens.push("'re");
      }
      // 've
      else if (lower.endsWith("'ve") && lower.length > 3) {
        tokens.push(word.slice(0, -3));
        tokens.push("'ve");
      }
      // 'll
      else if (lower.endsWith("'ll") && lower.length > 3) {
        tokens.push(word.slice(0, -3));
        tokens.push("'ll");
      }
      // 'd
      else if (lower.endsWith("'d") && lower.length > 2) {
        tokens.push(word.slice(0, -2));
        tokens.push("'d");
      }
      // 'm
      else if (lower.endsWith("'m") && lower.length > 2) {
        tokens.push(word.slice(0, -2));
        tokens.push("'m");
      }
      else {
        tokens.push(word);
      }
    } else if (m[2]) {
      tokens.push(m[2]);
    }
  }
  return tokens;
}

// =====================================================================
// 单词分析（逐词）
// =====================================================================
async function analyzeWords(sentence) {
  const key = sentence;
  if (analysisCache[key]) return analysisCache[key];

  const tokens = tokenize(sentence);
  const words = tokens.filter(t => /^[a-zA-Z]/.test(t)); // 只分析字母开头的词
  const results = [];

  for (const token of tokens) {
    if (!/^[a-zA-Z]/.test(token)) {
      // 标点符号
      results.push({ original: token, lemma: token, pos: 'punct', zh: token, isPunct: true });
      continue;
    }

    const lower = token.toLowerCase();
    let info;

    // 查迷你词典
    if (MINI_DICT[lower]) {
      info = { ...MINI_DICT[lower] };
    } else {
      // 推断词性和原形
      const pos = inferPOS(token);
      const lemma = inferLemma(token, pos);
      info = { lemma, pos, zh: '' };
    }

    results.push({
      original: token,
      lemma: info.lemma,
      pos: info.pos,
      zh: info.zh,
      def: info.def || '',
      isPunct: false,
      dictFetched: !!info.zh // 如果迷你词典有中文则标记已获取
    });
  }

  analysisCache[key] = results;
  return results;
}

// =====================================================================
// 异步补充 Free Dictionary API 词义
// =====================================================================
const DICT_API_BASE = 'https://api.dictionaryapi.dev/api/v2/entries/en/';
let dictQueue = [];
let dictFetching = false;

async function fetchWordDefinition(word) {
  const lower = word.toLowerCase();
  if (dictCache[lower] !== undefined) return dictCache[lower];

  try {
    const resp = await fetch(DICT_API_BASE + encodeURIComponent(lower), { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('Empty');

    // 提取第一个释义
    const entry = data[0];
    const meanings = entry.meanings || [];
    let primaryPos = 'other';
    let primaryZh = '';
    let definitions = [];

    for (const m of meanings) {
      const partOfSpeech = m.partOfSpeech; // noun, verb, adjective, adverb, etc.
      const posMap = { noun: 'noun', verb: 'verb', adjective: 'adj', adverb: 'adv',
                       preposition: 'prep', pronoun: 'pron', determiner: 'det',
                       conjunction: 'conj', interjection: 'interj' };
      const pos = posMap[partOfSpeech] || 'other';
      if (!primaryPos || primaryPos === 'other') primaryPos = pos;

      for (const d of (m.definitions || []).slice(0, 2)) {
        definitions.push({ pos, definition: d.definition, example: d.example || '' });
      }
    }

    // 用定义做简单中文标注（因为 Free Dictionary 不提供中文，我们标注英文定义首条）
    const result = {
      found: true,
      pos: primaryPos,
      definitions,
      phonetic: entry.phonetic || '',
      lemma: entry.word || lower
    };

    dictCache[lower] = result;
    return result;
  } catch (e) {
    dictCache[lower] = { found: false, pos: 'other', definitions: [], phonetic: '', lemma: lower };
    return dictCache[lower];
  }
}

// =====================================================================
// 有道词典中文翻译（补充 Free Dictionary 不提供中文的问题）
// =====================================================================
async function fetchChineseFromYoudao(word) {
  const lower = word.toLowerCase();
  if (youdaoCache[lower] !== undefined) return youdaoCache[lower];

  try {
    const resp = await fetch(
      'https://dict.youdao.com/suggest?num=1&q=' + encodeURIComponent(lower) + '&doctype=json',
      { signal: AbortSignal.timeout(5000) }
    );
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();

    const entries = data?.data?.entries;
    if (entries && entries.length > 0 && entries[0].explain) {
      const explain = entries[0].explain;
      // 提取中文部分，如 "n. 勇气；胆量" → "勇气；胆量"
      const zhMatch = explain.match(/[\u4e00-\u9fff\uff0c\u3001\uff1b\u3002；，、。].*/);
      const zh = zhMatch ? zhMatch[0].replace(/^[;\s]+/, '') : explain;
      youdaoCache[lower] = zh;
      return zh;
    }
    youdaoCache[lower] = '';
    return '';
  } catch (e) {
    youdaoCache[lower] = '';
    return '';
  }
}

// 批量获取句中缺少中文释义的词
async function fetchMissingChinese(wordAnalysisList) {
  const promises = [];
  for (const w of wordAnalysisList) {
    if (w.isPunct || w.zh) continue;
    promises.push((async () => {
      try {
        const zh = await fetchChineseFromYoudao(w.lemma);
        if (zh) w.zh = zh;
      } catch (e) { /* ignore */ }
    })());
  }
  if (promises.length > 0) {
    // 限制并发
    const chunks = [];
    for (let i = 0; i < promises.length; i += 3) {
      chunks.push(Promise.all(promises.slice(i, i + 3)));
    }
    for (const chunk of chunks) {
      await chunk;
    }
  }
}

// 批量获取句中未获取的词义
async function fetchMissingDefinitions(wordAnalysisList) {
  const promises = [];
  for (const w of wordAnalysisList) {
    if (w.isPunct || w.dictFetched) continue;
    if (dictCache[w.lemma.toLowerCase()] !== undefined) continue;
    promises.push(fetchWordDefinition(w.lemma.toLowerCase()));
  }
  if (promises.length > 0) {
    // 限制并发
    const chunks = [];
    for (let i = 0; i < promises.length; i += 3) {
      chunks.push(Promise.all(promises.slice(i, i + 3)));
    }
    for (const chunk of chunks) {
      await chunk;
    }
  }
}

// =====================================================================
// 语法分析（纯规则匹配）
// =====================================================================
function analyzeGrammar(sentence) {
  if (grammarCache[sentence]) return grammarCache[sentence];

  const s = sentence.trim();
  const words = tokenize(s).filter(t => /^[a-zA-Z]/.test(t));
  const lowerWords = words.map(w => w.toLowerCase());
  const result = {
    tense: '',           // 时态
    sentenceType: '',    // 句式
    components: [],      // 核心成分 [{role, words}]
    clauses: []          // 从句 [{type, words}]
  };

  // ===== 1. 句式判断 =====
  if (s.endsWith('?')) {
    result.sentenceType = '疑问句';
  } else if (lowerWords.includes('not') || lowerWords.includes("n't") || lowerWords.includes('never') || lowerWords.includes('no')) {
    // 检查是否否定
    const hasNegation = lowerWords.some(w => w === 'not' || w === "n't" || w === 'never' || w === 'no' || w === 'nothing' || w === 'nobody' || w === 'nowhere' || w === 'neither' || w === 'nor');
    if (s.endsWith('?')) {
      result.sentenceType = '疑问句';
    } else {
      result.sentenceType = hasNegation ? '否定句' : '陈述句';
    }
  } else if (s.endsWith('!') && !lowerWords.includes('what') && !lowerWords.includes('how')) {
    result.sentenceType = '祈使句';
    // 祈使句：动词开头
    if (words.length > 0) {
      const firstWord = lowerWords[0];
      const verbStarters = ['go', 'come', 'let', 'please', 'don', 'do', 'stop', 'get', 'take',
                            'give', 'tell', 'make', 'put', 'keep', 'look', 'listen', 'watch',
                            'wait', 'try', 'be', 'have', 'run', 'sit', 'stand', 'open', 'close',
                            'turn', 'move', 'leave', 'call', 'help', 'show', 'read', 'write',
                            'send', 'bring', 'pay', 'buy', 'eat', 'drink', 'sleep', 'wake',
                            'start', 'begin', 'stop', 'finish', 'remember', 'forget', 'think',
                            'believe', 'imagine', 'consider', 'feel', 'hear', 'see', 'say',
                            'speak', 'ask', 'answer', 'use', 'pick', 'choose', 'check', 'set',
                            'follow', 'hold', 'catch', 'pull', 'push', 'lift', 'drop', 'raise'];
      if (verbStarters.includes(firstWord)) {
        result.sentenceType = '祈使句';
      }
    }
  } else {
    // 判断是否祈使：动词原形开头且不是助动词
    if (words.length > 0) {
      const firstWord = lowerWords[0];
      const auxVerbs = ['i', 'you', 'he', 'she', 'it', 'we', 'they', 'the', 'a', 'an',
                        'this', 'that', 'these', 'those', 'my', 'your', 'his', 'her', 'its',
                        'our', 'their', 'there', 'here', 'what', 'who', 'which', 'when', 'where',
                        'why', 'how', 'all', 'some', 'every', 'each', 'both', 'either', 'neither',
                        'much', 'many', 'more', 'most', 'few', 'little', 'several', 'enough',
                        'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten',
                        'no', 'not', 'if', 'because', 'although', 'since', 'while', 'when', 'after',
                        'before', 'until', 'unless', 'whether'];
      if (!auxVerbs.includes(firstWord)) {
        const verbStarters = ['go', 'come', 'let', 'please', 'don', 'do', 'stop', 'get', 'take',
                              'give', 'tell', 'make', 'put', 'keep', 'look', 'listen', 'watch',
                              'wait', 'try', 'be', 'have', 'run', 'sit', 'stand', 'open', 'close',
                              'turn', 'move', 'leave', 'call', 'help', 'show', 'read', 'write',
                              'send', 'bring', 'pay', 'buy', 'eat', 'drink', 'sleep', 'wake',
                              'start', 'begin', 'stop', 'finish', 'remember', 'forget', 'think',
                              'feel', 'hear', 'see', 'say', 'speak', 'ask', 'answer', 'use',
                              'pick', 'choose', 'check', 'set', 'follow', 'hold', 'catch', 'pull',
                              'push', 'lift', 'drop', 'raise', 'never', 'always', 'just', 'only'];
        if (verbStarters.includes(firstWord)) {
          result.sentenceType = '祈使句';
        } else {
          result.sentenceType = '陈述句';
        }
      } else {
        result.sentenceType = '陈述句';
      }
    } else {
      result.sentenceType = '陈述句';
    }
  }

  // 问句反转检查：助动词/Be动词/Have开头
  const questionStarters = ['do', 'does', 'did', 'is', 'are', 'was', 'were', 'have', 'has', 'had',
                            'will', 'would', 'shall', 'should', 'can', 'could', 'may', 'might', 'must'];
  if (lowerWords.length > 0 && questionStarters.includes(lowerWords[0]) && !s.endsWith('?')) {
    // 不以问号结尾但有疑问词开头的，仍算陈述
  }

  // ===== 2. 时态判断 =====
  const hasWill = lowerWords.includes('will') || lowerWords.includes("'ll");
  const hasWould = lowerWords.includes('would');
  const hasShall = lowerWords.includes('shall');
  const hasShould = lowerWords.includes('should');
  const hasHave = lowerWords.includes('have') || lowerWords.includes('has') || lowerWords.includes('had') || lowerWords.includes("'ve");
  const hasHad = lowerWords.includes('had');
  const hasBe = lowerWords.includes('is') || lowerWords.includes('am') || lowerWords.includes('are') || lowerWords.includes('was') || lowerWords.includes('were') || lowerWords.includes('be') || lowerWords.includes("'m") || lowerWords.includes("'re");
  const hasBeen = lowerWords.includes('being') || lowerWords.includes('been');
  const hasIng = words.some(w => w.length > 4 && w.toLowerCase().endsWith('ing'));
  const hasEd = words.some(w => w.length > 3 && w.toLowerCase().endsWith('ed'));

  // 常见过去式词
  const pastWords = ['was', 'were', 'went', 'came', 'said', 'told', 'knew', 'thought',
                     'saw', 'got', 'made', 'took', 'gave', 'found', 'heard', 'felt',
                     'kept', 'left', 'lost', 'ran', 'wrote', 'spoke', 'drove', 'ate',
                     'fell', 'grew', 'chose', 'rode', 'rose', 'stole', 'woke', 'hid',
                     'froze', 'began', 'drank', 'flew', 'hung', 'led', 'shut', 'sang',
                     'swam', 'taught', 'threw', 'brought', 'caught', 'bought', 'built',
                     'cut', 'drew', 'paid', 'sat', 'stood', 'won', 'sold', 'meant',
                     'held', 'met', 'put', 'read', 'set'];
  const hasPastWord = lowerWords.some(w => pastWords.includes(w));

  if (hasWill || hasShall) {
    if (hasBe && hasIng) {
      result.tense = '将来进行时';
    } else if (hasHave && (hasEd || hasBeen || lowerWords.some(w => pastWords.includes(w)))) {
      result.tense = '将来完成时';
    } else {
      result.tense = '一般将来时';
    }
  } else if (hasWould || hasShould) {
    if (hasBe && hasIng) {
      result.tense = '过去将来进行时';
    } else if (hasHave && (hasEd || hasBeen)) {
      result.tense = '过去将来完成时';
    } else {
      result.tense = '过去将来时';
    }
  } else if (hasHave) {
    if (hasHad) {
      // had + 过去分词
      if (hasBeen && hasIng) {
        result.tense = '过去完成进行时';
      } else {
        result.tense = '过去完成时';
      }
    } else if (hasBeen && hasIng) {
      result.tense = '现在完成进行时';
    } else if (hasBe && hasIng) {
      result.tense = '现在完成进行时';
    } else {
      result.tense = '现在完成时';
    }
  } else if (hasBe && hasIng) {
    if (lowerWords.includes('was') || lowerWords.includes('were')) {
      result.tense = '过去进行时';
    } else {
      result.tense = '现在进行时';
    }
  } else if (hasPastWord || hasEd || lowerWords.includes('was') || lowerWords.includes('were')) {
    result.tense = '一般过去时';
  } else {
    result.tense = '一般现在时';
  }

  // ===== 3. 核心成分标注 =====
  // 简化版：基于词性序列推断 SVO
  const wordInfoList = words.map((w, i) => {
    const lower = w.toLowerCase();
    let pos;
    if (MINI_DICT[lower]) pos = MINI_DICT[lower].pos;
    else pos = inferPOS(w);
    return { word: w, lower, pos, index: i };
  });

  // 找主语：句首的代词/名词，到第一个动词之前
  let subjectEnd = -1;
  let predicateStart = -1;
  let predicateEnd = -1;
  let objectStart = -1;

  // 找第一个实义动词
  for (let i = 0; i < wordInfoList.length; i++) {
    if (wordInfoList[i].pos === 'verb') {
      predicateStart = i;
      break;
    }
  }

  if (predicateStart === -1) predicateStart = wordInfoList.length;

  // 主语 = 句首到谓语动词之前（排除冠词）
  if (predicateStart > 0) {
    const subjectWords = [];
    for (let i = 0; i < predicateStart; i++) {
      if (wordInfoList[i].pos === 'det' || wordInfoList[i].pos === 'prep') continue;
      subjectWords.push(i);
    }
    if (subjectWords.length > 0) {
      result.components.push({ role: '主语 (S)', wordIndices: subjectWords });
    }
  }

  // 谓语 = 动词序列（含助动词）
  if (predicateStart < wordInfoList.length) {
    const predWords = [];
    let i = predicateStart;
    // 包括助动词链
    while (i < wordInfoList.length && (wordInfoList[i].pos === 'verb' || wordInfoList[i].pos === 'adv')) {
      predWords.push(i);
      i++;
      // 如果下一个是副词再动词（如 "not go"）
      if (i < wordInfoList.length && wordInfoList[i].pos === 'adv' && i + 1 < wordInfoList.length && wordInfoList[i+1].pos === 'verb') {
        predWords.push(i);
        i++;
      }
    }
    predicateEnd = i - 1;
    if (predWords.length > 0) {
      result.components.push({ role: '谓语 (V)', wordIndices: predWords });
    }

    // 宾语 = 谓语之后的名词/代词
    const objWords = [];
    for (let j = predicateEnd + 1; j < wordInfoList.length; j++) {
      if (wordInfoList[j].pos === 'noun' || wordInfoList[j].pos === 'pron') {
        objWords.push(j);
      } else if (wordInfoList[j].pos === 'det' && objWords.length === 0) {
        // 冠词在宾语名词前
        objWords.push(j);
      } else if (wordInfoList[j].pos === 'adj' && objWords.length > 0) {
        // 形容词修饰宾语
        continue;
      } else if (objWords.length > 0) {
        break;
      }
    }
    if (objWords.length > 0) {
      result.components.push({ role: '宾语 (O)', wordIndices: objWords });
    }

    // 修饰语/状语 = 介词短语等
    const modifierWords = [];
    for (let j = predicateEnd + 1; j < wordInfoList.length; j++) {
      if (wordInfoList[j].pos === 'prep') {
        // 介词短语开始
        const prepPhrase = [j];
        j++;
        while (j < wordInfoList.length && wordInfoList[j].pos !== 'verb' && wordInfoList[j].pos !== 'conj') {
          prepPhrase.push(j);
          j++;
        }
        modifierWords.push(...prepPhrase);
        j--;
      }
    }
    if (modifierWords.length > 0) {
      result.components.push({ role: '状语/修饰语', wordIndices: modifierWords });
    }
  } else {
    // 没有动词，整句可能是名词短语
    result.components.push({ role: '未知结构', wordIndices: wordInfoList.map((_, i) => i) });
  }

  // ===== 4. 从句识别 =====
  // 定语从句引导词
  const relativePronouns = ['who', 'whom', 'whose', 'which', 'that'];
  // 状语从句引导词
  const adverbialConjunctions = {
    'if': '条件状语从句', 'unless': '条件状语从句',
    'when': '时间状语从句', 'while': '时间状语从句', 'before': '时间状语从句',
    'after': '时间状语从句', 'since': '时间/原因状语从句', 'until': '时间状语从句',
    'till': '时间状语从句', 'once': '时间状语从句', 'as': '时间/方式状语从句',
    'because': '原因状语从句', 'since': '原因状语从句', 'as': '原因状语从句',
    'although': '让步状语从句', 'though': '让步状语从句', 'even': '让步状语从句',
    'where': '地点状语从句', 'wherever': '地点状语从句',
    'so': '结果状语从句', 'that': '结果/目的状语从句',
    'in order': '目的状语从句',
  };
  // 宾语从句引导词
  const objectClauseTriggers = ['that', 'whether', 'if', 'what', 'who', 'whom', 'which', 'how', 'why', 'where', 'when'];

  for (let i = 0; i < lowerWords.length; i++) {
    const w = lowerWords[i];

    // 定语从句：名词后的 that/which/who
    if (relativePronouns.includes(w) && i > 0) {
      const prevPos = wordInfoList[i-1]?.pos;
      if (prevPos === 'noun' || prevPos === 'pron' || prevPos === 'adj') {
        // 找从句结尾（到下一个逗号或句末）
        let clauseEnd = Math.min(i + 8, lowerWords.length);
        for (let j = i + 1; j < lowerWords.length; j++) {
          if (lowerWords[j] === 'and' || lowerWords[j] === 'but' || lowerWords[j] === 'or') {
            clauseEnd = j;
            break;
          }
        }
        result.clauses.push({
          type: '定语从句',
          trigger: w,
          wordIndices: Array.from({length: clauseEnd - i}, (_, k) => i + k)
        });
        i = clauseEnd;
        continue;
      }
    }

    // 状语从句
    if (adverbialConjunctions[w] && (i === 0 || (i > 0 && wordInfoList[i-1]?.pos === 'conj' || lowerWords[i-1] === ','))) {
      let clauseEnd = Math.min(i + 10, lowerWords.length);
      for (let j = i + 1; j < lowerWords.length; j++) {
        if ([',', 'and', 'but'].includes(lowerWords[j]) && j > i + 2) {
          clauseEnd = j;
          break;
        }
      }
      result.clauses.push({
        type: adverbialConjunctions[w],
        trigger: w,
        wordIndices: Array.from({length: clauseEnd - i}, (_, k) => i + k)
      });
      i = clauseEnd;
      continue;
    }

    // 宾语从句：动词后紧跟 that/whether/if 等
    if (objectClauseTriggers.includes(w) && i > 0 && i < lowerWords.length - 2) {
      const prevPos = wordInfoList[i-1]?.pos;
      if (prevPos === 'verb') {
        let clauseEnd = Math.min(i + 10, lowerWords.length);
        result.clauses.push({
          type: '宾语从句',
          trigger: w,
          wordIndices: Array.from({length: clauseEnd - i}, (_, k) => i + k)
        });
        i = clauseEnd;
        continue;
      }
    }
  }

  grammarCache[sentence] = result;
  return result;
}

function handleFile(file) {
  if (!file.name.endsWith('.srt')) {
    alert('请上传 .srt 格式的字幕文件');
    return;
  }
  // 先用 ArrayBuffer 读取，再尝试 UTF-8 解码；如果检测到乱码（大量 U+FFFD），自动回退用 GBK 解码
  const reader = new FileReader();
  reader.onload = async e => {
    const buffer = e.target.result;
    const uint8 = new Uint8Array(buffer);

    // 先尝试 UTF-8 解码
    const utf8Text = new TextDecoder('utf-8', { fatal: false }).decode(uint8);

    // 检测乱码：统计 U+FFFD 替换字符的比例
    const replacementCount = (utf8Text.match(/\uFFFD/g) || []).length;
    const totalChars = utf8Text.length || 1;
    const garbledRatio = replacementCount / totalChars;

    let text;
    if (garbledRatio > 0.01) {
      // UTF-8 解码出现较多替换字符，疑似 GBK/GB2312 编码，回退用 GBK 解码
      text = new TextDecoder('gbk', { fatal: false }).decode(uint8);
    } else {
      text = utf8Text;
    }

    const parsed = parseSRT(text);
    if (parsed.length === 0) {
      alert('无法解析该 SRT 文件，请检查格式');
      return;
    }

    // 保存到 IndexedDB
    currentFileKey = file.name;
    subtitles = parsed;
    currentIdx = -1;
    analysisCache = {};
    grammarCache = {};
    aiExplanationCache = {};
    favFilterActive = false;

    const fileObj = {
      name: file.name,
      subtitles: parsed,
      uploadTime: Date.now(),
      subtitleCount: parsed.length
    };

    try {
      await dbSaveFile(fileObj);
      console.log(`[IndexedDB] 已保存文件 ${file.name}，共 ${parsed.length} 条字幕`);
    } catch(e) {
      console.warn('[IndexedDB] 保存失败:', e);
    }

    // 保存当前文件名到 localStorage
    localStorage.setItem('srt_current_file', file.name);

    // 加载该文件的笔记
    notesMap = await dbLoadAllNotes(file.name);

    showMainPage();
  };
  reader.readAsArrayBuffer(file);
}

// =====================================================================
// 加载 ai_explanations.json（如果存在，直接缓存 AI 解释，无需调用 API）
// =====================================================================
async function loadAIExplanationsFile() {
  try {
    const resp = await fetch('./ai_explanations.json', { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) {
      console.log('[AI] ai_explanations.json 不存在，回退到 API 调用模式');
      return;
    }
    const data = await resp.json();
    if (typeof data === 'object' && data !== null) {
      let rawExps = null;
      // 格式1: { version, source, explanations: { "1": {...}, "2": {...} } }
      if (data.explanations && typeof data.explanations === 'object') {
        rawExps = data.explanations;
      }
      // 格式2: { "sentence text": {...}, ... }
      else if (!Array.isArray(data) && !data.version && !data.source) {
        rawExps = data;
      }
      // 格式3: [{ sentence: "...", ... }]
      else if (Array.isArray(data)) {
        rawExps = {};
        for (const item of data) {
          if (item.sentence) {
            rawExps[item.sentence] = item;
          }
        }
      }

      if (rawExps) {
        // 如果 key 是数字索引（如 "1", "2"），映射到对应句子文本
        const keys = Object.keys(rawExps);
        const allNumeric = keys.length > 0 && keys.every(k => /^\d+$/.test(k));
        if (allNumeric && subtitles && subtitles.length > 0) {
          for (const k of keys) {
            const idx = parseInt(k);
            // 索引从1开始，对应 subtitles[idx-1]
            if (idx >= 1 && idx <= subtitles.length) {
              const sentence = subtitles[idx - 1].text;
              aiExplanationCache[sentence] = rawExps[k];
            }
          }
        } else {
          // key 已经是句子文本，直接合并
          Object.assign(aiExplanationCache, rawExps);
        }
        console.log(`[AI] 已从 ai_explanations.json 加载 ${Object.keys(rawExps).length} 条预生成解释`);
      }
    }
  } catch (e) {
    console.log('[AI] ai_explanations.json 加载失败，回退到 API 调用模式:', e.message);
  }
}

function updateStats() {
  const totalSentences = subtitles.length;
  let totalWords = 0;
  const uniqueWords = new Set();
  for (const sub of subtitles) {
    const words = tokenize(sub.text).filter(t => /^[a-zA-Z]/.test(t));
    totalWords += words.length;
    words.forEach(w => uniqueWords.add(w.toLowerCase()));
  }
  document.getElementById('stat-sentences').textContent = totalSentences;
  document.getElementById('stat-words').textContent = totalWords;
  document.getElementById('stat-unique').textContent = uniqueWords.size;
}

    const translation = aiData.translation || '';

    const expressionNote = aiData.expressionNote || '';

    if (literalTranslation) {
      translationHTML += `<div style="font-size:13px;color:var(--text-muted);margin-top:8px">📖 字面翻译：${escapeHtml(literalTranslation)}</div>`;
    }
    if (actualMeanings && actualMeanings.length > 0) {
      translationHTML += `<div style="margin-top:6px">${actualMeanings.map(m => `<div class="ai-meaning-item">👉 ${escapeHtml(m)}</div>`).join('')}</div>`;
    } else if (translation) {
      translationHTML += `<div style="margin-top:8px;font-size:15px;color:var(--text-primary);font-weight:500">${escapeHtml(translation)}</div>`;
    }
    if (expressionNote) {
      translationHTML += `<div class="ai-expression-note" style="margin-top:6px">💡 ${escapeHtml(expressionNote)}</div>`;
    }
  } else {
    // 没有AI数据时，尝试从词典给出简单翻译
    let briefTrans = '';
    if (wordAnalysis) {
      const words = wordAnalysis.filter(w => !w.isPunct && w.chinese);
      if (words.length > 0) {
        briefTrans = words.map(w => `<span style="color:${posColor(w.pos)}">${escapeHtml(w.original)}</span><span style="color:var(--text-muted);font-size:12px">(${escapeHtml(w.chinese.split(';')[0])})</span>`).join(' ');

// 在后台分析单词（不阻塞UI）
async function analyzeWordsInBackground(sentence) {
  const wordAnalysis = await analyzeWords(sentence);
  // 异步获取词典定义
  await fetchMissingDefinitions(wordAnalysis);
  // 合并词典结果
  for (const w of wordAnalysis) {
    if (w.isPunct || w.dictFetched) continue;
    const cached = dictCache[w.lemma.toLowerCase()];
    if (cached && cached.found) {
      if (cached.pos && cached.pos !== 'other') {
        w.pos = cached.pos;
      }
      w.lemma = cached.lemma || w.lemma;
      w.phonetic = cached.phonetic || '';
      w.definitions = cached.definitions || [];
    }
    w.dictFetched = true;
  }
  // 用有道词典补充中文释义
  await fetchMissingChinese(wordAnalysis);
  // 如果句子信息面板还在显示这个句子，更新词性着色
  if (currentIdx >= 0 && subtitles[currentIdx] && subtitles[currentIdx].text === sentence) {
    updateSentenceInfoPanel(subtitles[currentIdx]);
  }
}

function showWordDetail(wordIdx, event) {
  const sub = subtitles[currentIdx];
  if (!sub) return;
  const wordAnalysis = analysisCache[sub.text];
  if (!wordAnalysis) return;

  const words = wordAnalysis.filter(w => !w.isPunct);
  if (wordIdx >= words.length) return;

  const w = words[wordIdx];
  const tooltip = document.getElementById('word-tooltip');

  // 构建所有 definitions（不同词性全部展示）
  let defsHTML = '';
  if (w.definitions && w.definitions.length > 0) {
    defsHTML = w.definitions.map(d =>
      `<div class="mb-1">
        <span class="tag mr-1" style="background:${posColor(d.pos)}22;color:${posColor(d.pos)}">${posZh(d.pos)}</span>
        <span class="text-sm" style="color:var(--text-primary)">${escapeHtml(d.definition)}</span>
      </div>`
    ).join('');
  } else if (w.def) {
    defsHTML = `<div class="mb-1"><span class="text-sm" style="color:var(--text-primary)">${escapeHtml(w.def)}</span></div>`;
  }

  // 提取与该词相关的 AI 知识点
  let kpHTML = '';
  const aiData = aiExplanationCache[sub.text];
  if (aiData && aiData.knowledgePoints) {
    const wordLower = w.original.toLowerCase();
    const lemmaLower = w.lemma.toLowerCase();
    const relatedKPs = aiData.knowledgePoints.filter(kp => {
      const titleLower = (kp.title || '').toLowerCase();
      const contentLower = (kp.content || '').toLowerCase();
      return titleLower.includes(wordLower) || contentLower.includes(wordLower) ||
             titleLower.includes(lemmaLower) || contentLower.includes(lemmaLower);
    });
    if (relatedKPs.length > 0) {
      kpHTML = '<div class="border-t pt-2 mt-2" style="border-color:var(--border)"><div class="text-xs mb-1 font-semibold" style="color:var(--accent)">💡 相关知识点</div>';
      for (const kp of relatedKPs.slice(0, 3)) {
        kpHTML += `<div class="mb-2">
          <div class="text-xs font-semibold" style="color:var(--text-primary)">${escapeHtml(kp.title)}</div>
          <div class="text-xs" style="color:var(--text-secondary);line-height:1.5">${escapeHtml(kp.content)}</div>
          ${kp.example ? `<div class="text-xs mt-0.5" style="color:var(--text-muted);font-style:italic;border-left:2px solid var(--accent);padding-left:6px">${escapeHtml(kp.example)}</div>` : ''}
        </div>`;
      }
      kpHTML += '</div>';
    }
  }

  tooltip.innerHTML = `
    <div class="mb-2">
      <span class="text-lg font-bold" style="color:var(--text-primary)">${escapeHtml(w.original)}</span>
      ${w.phonetic ? `<span class="text-sm ml-2" style="color:var(--text-muted)">/${escapeHtml(w.phonetic)}/</span>` : ''}
    </div>
    <div class="flex gap-2 mb-2">
      <span class="tag" style="background:${posColor(w.pos)}22;color:${posColor(w.pos)}">${posZh(w.pos)}</span>
      <span class="text-xs" style="color:var(--text-muted)">原形: ${escapeHtml(w.lemma)}</span>
    </div>
    <div class="text-base mb-2 font-semibold" style="color:var(--accent)">${escapeHtml(w.zh || '暂无中文释义')}</div>
    ${defsHTML ? '<div class="border-t pt-2 mt-2" style="border-color:var(--border)"><div class="text-xs mb-1" style="color:var(--text-muted)">英文释义:</div>' + defsHTML + '</div>' : ''}
    ${kpHTML}
  `;

  tooltip.classList.remove('hidden');

  // 定位
  const rect = event.target.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;

  // 防止超出视口
  if (top + 200 > window.innerHeight) top = rect.top - 200;
  if (left + 320 > window.innerWidth) left = window.innerWidth - 340;
  if (left < 10) left = 10;

  tooltip.style.top = top + 'px';
  tooltip.style.left = left + 'px';
}

function exportJSON() {
  const data = {
    exportTime: new Date().toISOString(),
    totalSentences: subtitles.length,
    subtitles: subtitles.map(sub => {
      const wordAnalysis = analysisCache[sub.text] || [];
      const grammarResult = grammarCache[sub.text] || null;
      return {
        index: sub.index,
        time: sub.time,
        text: sub.text,
        words: wordAnalysis.filter(w => !w.isPunct).map(w => ({
          original: w.original,
          lemma: w.lemma,
          pos: w.pos,
          posZh: posZh(w.pos),
          zh: w.zh || '',
          def: w.def || '',
          definitions: w.definitions || []
        })),
        grammar: grammarResult
      };
    })
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'srt-analysis.json';
  a.click();
  URL.revokeObjectURL(url);
}

    selectSubtitle(currentIdx + 1);
    scrollToItem(currentIdx);
  } else if (e.key === 'ArrowUp' && currentIdx > 0) {
    e.preventDefault();
    selectSubtitle(currentIdx - 1);
    scrollToItem(currentIdx);
  }
});

function scrollToItem(idx) {
  const items = document.querySelectorAll('.subtitle-item');
  if (items[idx]) items[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// =====================================================================
// 页面加载时自动恢复（优先从 IndexedDB 恢复，兼容旧版 localStorage）
// =====================================================================
(async function restoreFromCache() {
  try {
    // 尝试从 IndexedDB 恢复
    const files = await dbListFiles();
    if (files.length > 0) {
      // 尝试恢复上次打开的文件
      const lastFile = localStorage.getItem('srt_current_file');
      if (lastFile) {
        const fileObj = await dbLoadFile(lastFile);
        if (fileObj && fileObj.subtitles && fileObj.subtitles.length > 0) {
          currentFileKey = lastFile;
          subtitles = fileObj.subtitles;
          notesMap = await dbLoadAllNotes(lastFile);
          console.log(`[IndexedDB] 恢复上次打开的文件 ${lastFile}，共 ${subtitles.length} 条字幕`);
          showMainPage();
          return;
        }
      }
      // 没有上次打开的记录，恢复最新上传的文件
      files.sort((a, b) => (b.uploadTime || 0) - (a.uploadTime || 0));
      const latest = files[0];
      const fileObj = await dbLoadFile(latest.name);
      if (fileObj && fileObj.subtitles && fileObj.subtitles.length > 0) {
        currentFileKey = latest.name;
        subtitles = fileObj.subtitles;
        notesMap = await dbLoadAllNotes(latest.name);
        localStorage.setItem('srt_current_file', latest.name);
        console.log(`[IndexedDB] 恢复最新文件 ${latest.name}，共 ${subtitles.length} 条字幕`);
        showMainPage();
        return;
      }
    }

    // 兼容旧版：从 localStorage 恢复（迁移到 IndexedDB）
    const cached = localStorage.getItem('srt_subtitles');
    if (cached) {
      const parsed = JSON.parse(cached);
      if (parsed.length > 0) {
        const filename = localStorage.getItem('srt_filename') || 'migrated.srt';
        currentFileKey = filename;
        subtitles = parsed;
        // 迁移到 IndexedDB
        const fileObj = {
          name: filename,
          subtitles: parsed,
          uploadTime: Date.now(),
          subtitleCount: parsed.length
        };
        await dbSaveFile(fileObj);
        localStorage.setItem('srt_current_file', filename);
        notesMap = await dbLoadAllNotes(filename);
        console.log(`[Migration] 从 localStorage 迁移 ${filename} 到 IndexedDB`);
        // 清除旧版缓存
        localStorage.removeItem('srt_subtitles');
        localStorage.removeItem('srt_filename');
        showMainPage();
        return;
      }
    }

    // 没有任何缓存，显示上传页并渲染历史列表
    renderFileHistory();
  } catch(e) {
    console.warn('[Restore] 恢复缓存失败:', e);
    // 降级：尝试旧版 localStorage
    try {
      const cached = localStorage.getItem('srt_subtitles');
      if (cached) {
        subtitles = JSON.parse(cached);
        if (subtitles.length > 0) {
          currentFileKey = localStorage.getItem('srt_filename') || 'unknown.srt';
          console.log(`[Storage] 从 localStorage 恢复 ${subtitles.length} 条字幕`);
          showMainPage();
          return;
        }
      }
    } catch(e2) {
      console.warn('[Storage] 旧版恢复也失败:', e2);
    }
    // 显示上传页
    renderFileHistory();
  }
})();
</script>
